<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Injector</title>
<style>
body {
  font-family: 'Roboto', sans-serif;
  background: #000;
  color: #0ff;
  display: flex;
  justify-content: center;
  padding: 20px;
}
.container {
  max-width: 450px;
  width: 100%;
  border: 2px solid cyan;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
}
input[type="file"] {
  margin: 10px 0;
}
button {
  background: #0ff;
  color: #000;
  font-weight: bold;
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  letter-spacing: 2px;
}
pre {
  background: #111;
  padding: 10px;
  border-radius: 8px;
  text-align: left;
  color: #0f0;
  max-height: 200px;
  overflow-y: auto;
}
</style>
</head>
<body>
<div class="container">
  <h2>Video Injector</h2>
  <input type="file" id="videoInput" accept="video/mp4">
  <br>
  <button onclick="injectVideo()">INJECT VIDEO</button>
  <pre id="log"></pre>
</div>

<script>
function log(text) {
  document.getElementById('log').textContent += '> ' + text + '\n';
}

async function injectVideo() {
  const fileInput = document.getElementById('videoInput');
  if (!fileInput.files.length) {
    log('Pilih file video dulu!');
    return;
  }

  const file = fileInput.files[0];
  log('Memulai proses...');
  log('Target: ' + file.name);
  log('Menyiapkan encoding video...');

  // simulasi proses encoding
  await new Promise(resolve => setTimeout(resolve, 1500));

  log('Encoding dengan opsi: -c:v libx264 -b:v 24M -minrate 24M -maxrate 24M -bufsize 48M -preset medium -c:a copy');
  
  await new Promise(resolve => setTimeout(resolve, 1500));

  log('Menyimpan file output...');
  
  // simulasi download file
  const blob = new Blob([file], { type: 'video/mp4' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = file.name.replace('.mp4', '_out.mp4');
  a.click();

  log('Selesai! File siap di-download.');
}
</script>
</body>
</html>
