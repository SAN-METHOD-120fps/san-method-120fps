<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAN METHOD 120FPS</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  min-height:100%;
  background:#000;
  overflow-x:hidden;
  font-family:Arial,sans-serif;
}

body{
  display:flex;
  justify-content:center;
  padding:18px 10px;
}

.box{
  width:100%;
  max-width:430px;
  background:#050505;
  border:2px solid cyan;
  border-radius:16px;
  padding:28px 18px;
  text-align:center;
}

.pp{
  width:110px;
  height:110px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid cyan;
  display:block;
  margin:0 auto 24px;
  background:#111;
}

h1{
  font-size:46px;
  line-height:48px;
  font-weight:900;
  color:cyan;
  margin-bottom:18px;
}

.sub{
  font-size:15px;
  color:#fff;
  margin-bottom:22px;
  letter-spacing:2px;
  opacity:.9;
}

.follow-btn,
.upload-btn{
  width:100%;
  height:58px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:14px;
  text-decoration:none;
  font-size:21px;
  font-weight:900;
  letter-spacing:1px;
  color:#fff;
  margin-bottom:18px;
  position:relative;
}

.follow-btn::before{
  content:"";
  position:absolute;
  inset:0;
  padding:2px;
  border-radius:14px;
  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet,red);
  background-size:300% 300%;
  animation:rgbBorder 4s linear infinite;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
}

.follow-btn::after{
  content:"";
  position:absolute;
  inset:3px;
  background:#000;
  border-radius:12px;
  z-index:1;
}

.follow-btn span{
  position:relative;
  z-index:2;
}

.upload-btn{
  border:2px solid red;
}

.upload-btn span{
  position:relative;
  z-index:2;
}

@keyframes rgbBorder{
  0%{background-position:0% 50%;}
  100%{background-position:300% 50%;}
}

.tutorial{
  width:100%;
  border:2px solid orange;
  border-radius:14px;
  padding:20px;
  margin-bottom:24px;
  background:#000;
  color:#fff;
  text-align:left;
  font-size:15px;
  line-height:28px;
}

.lang-btn{
  cursor:pointer;
  border:1px solid #555;
  color:#aaa;
  padding:6px 12px;
  border-radius:8px;
  margin-left:6px;
}

.lang-btn.active{
  color:#fff;
}

.injectwrap{
  width:100%;
  padding:12px;
  border:2px solid cyan;
  border-radius:16px;
  background:#000;
  overflow:hidden;
}

.file-box{
  border:1px solid rgba(0,255,255,.7);
  border-radius:14px;
  padding:16px;
  margin-bottom:24px;
  text-align:left;
  background:#020707;
}

.file-label{
  font-size:14px;
  color:#9fffff;
  margin-bottom:10px;
  display:block;
}

input[type=file]{
  width:100%;
  background:#000;
  border:1px solid rgba(0,255,255,.4);
  border-radius:10px;
  padding:12px;
  font-size:15px;
  color:cyan;
}

.file-name{
  margin-top:12px;
  font-size:14px;
  line-height:1.5;
  color:#19fff4;
  word-break:break-all;
}

.inject-btn{
  width:100%;
  border:none;
  border-radius:14px;
  padding:24px 10px;
  margin-bottom:28px;
  background:#23d3d3;
  font-size:22px;
  font-weight:900;
  letter-spacing:8px;
  color:#000;
  cursor:pointer;
}

.inject-btn:disabled{
  opacity:.45;
  cursor:not-allowed;
}

.terminal{
  border-radius:16px;
  overflow:hidden;
  background:#000;
  border:1px solid rgba(255,255,255,.12);
}

.terminal-header{
  height:52px;
  background:#1d1d1d;
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 18px;
  font-size:14px;
  letter-spacing:4px;
  color:#777;
}

.dot{
  width:17px;
  height:17px;
  border-radius:50%;
}

.red{background:#ff5f56;}
.yellow{background:#ffbd2e;}
.green{background:#27c93f;}

.terminal-body{
  min-height:320px;
  max-height:420px;
  overflow-y:auto;
  padding:20px;
  font-size:14px;
  line-height:1.8;
  font-family:"Courier New",monospace;
  color:#27ff4a;
  white-space:pre-wrap;
  text-align:left;
}

.download-btn{
  display:none;
  margin-top:18px;
  padding:16px;
  border:2px solid cyan;
  border-radius:14px;
  text-decoration:none;
  color:cyan;
  font-weight:bold;
  font-size:16px;
}
</style>
</head>
<body>

<div class="box">

<img src="icon.png" class="pp">

<h1>SAN METHOD<br>120FPS</h1>

<div class="sub">NO KOMPRES TIKTOK METHOD</div>

<a href="https://www.tiktok.com/" target="_blank" class="follow-btn">
<span>Follow TikTok</span>
</a>

<a href="https://www.tiktok.com/upload" target="_blank" class="upload-btn">
<span>Upload TikTok here</span>
</a>

<div class="tutorial" id="tutorialText">
1. Inject video kalian yang sudah di wink/HD<br>
2. Pencet "Upload TikTok here"
</div>

<div>
<button class="lang-btn active" onclick="setLang('id')">Indonesia</button>
<button class="lang-btn" onclick="setLang('en')">English</button>
</div>

</div>

<script>
function setLang(lang){
  const tutorial = document.getElementById('tutorialText');
  const buttons = document.querySelectorAll('.lang-btn');
  buttons.forEach(btn => btn.classList.remove('active'));
  if(lang === 'id'){
    tutorial.innerHTML = '1. Inject video kalian yang sudah di wink/HD<br>2. Pencet "Upload TikTok here"';
    buttons[0].classList.add('active');
  } else {
    tutorial.innerHTML = '1. Inject your video that has already been enhanced in Wink/HD<br>2. Click "Upload TikTok here"';
    buttons[1].classList.add('active');
  }
}
</script>

</body>
</html>
