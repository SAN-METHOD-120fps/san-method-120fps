<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAN METHOD HD 120FPS</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Roboto', sans-serif;
    background: #0c0c0c;
    color: #fff;
    display: flex;
    justify-content: center;
    padding: 20px;
}
.container {
    max-width: 500px;
    width: 100%;
    border: 2px solid #00d6e3;
    border-radius: 16px;
    padding: 20px;
}
h2 { text-align: center; margin-bottom: 20px; }
input[type=file] {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 6px;
    background: #111;
    color: #fff;
    border: 1px solid #00d6e3;
}
#dropZone {
    border: 2px dashed #00d6e3;
    padding: 30px;
    text-align: center;
    margin-bottom: 15px;
    cursor: pointer;
}
button {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
    color: #000;
    background: #00d6e3;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 15px;
}
.console {
    background: #111;
    color: #0f0;
    padding: 15px;
    border-radius: 8px;
    font-family: monospace;
    height: 200px;
    overflow-y: auto;
}
video {
    width: 100%;
    margin-bottom: 15px;
    border-radius: 8px;
}
</style>
</head>
<body>
<div class="container">
    <h2>SAN METHOD HD 120FPS</h2>
    <div id="dropZone">Drag & Drop video atau klik di sini</div>
    <input type="file" id="videoFile" accept="video/mp4" style="display:none;">
    <video id="previewVideo" controls></video>
    <button id="injectBtn">INJECT VIDEO</button>
    <div class="console" id="consoleOutput"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.11/dist/ffmpeg.min.js"></script>
<script>
const { createFFmpeg, fetchFile } = FFmpeg;
const ffmpeg = createFFmpeg({ log: false });
const consoleEl = document.getElementById('consoleOutput');
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('videoFile');
const previewVideo = document.getElementById('previewVideo');

function logConsole(text) {
    consoleEl.innerHTML += text + '<br>';
    consoleEl.scrollTop = consoleEl.scrollHeight;
}

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => e.preventDefault());
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    if (e.dataTransfer.files.length) {
        handleFile(e.dataTransfer.files[0]);
    }
});

fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

function handleFile(file) {
    previewVideo.src = URL.createObjectURL(file);
    previewVideo.load();
    previewVideo.play();
    fileInput.file = file; // simpan file
    logConsole(`[SYSTEM] File siap: ${file.name}`);
}

document.getElementById('injectBtn').addEventListener('click', async () => {
    const file = fileInput.file;
    if (!file) return alert('Pilih video terlebih dahulu!');
    logConsole('[SYSTEM] Memulai proses...');

    if (!ffmpeg.isLoaded()) {
        logConsole('[SYSTEM] Memuat engine...');
        await ffmpeg.load();
    }

    logConsole('[SYSTEM] Menyalin file...');
    ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

    logConsole('[SYSTEM] Memproses video dengan 120FPS...');
    try {
        await ffmpeg.run(
            '-i', 'input.mp4',
            '-filter:v', 'fps=120',
            '-c:v', 'libx264',
            '-b:v', '24M',
            '-minrate', '24M',
            '-maxrate', '24M',
            '-bufsize', '48M',
            '-preset', 'medium',
            '-c:a', 'copy',
            'san_method_hd.mp4'
        );

        logConsole('[SYSTEM] Selesai! Menyiapkan download...');
        const data = ffmpeg.FS('readFile', 'san_method_hd.mp4');
        const blob = new Blob([data.buffer], { type: 'video/mp4' });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = 'san_method_hd.mp4';
        a.click();

        logConsole('[SYSTEM] Video berhasil diunduh: san_method_hd.mp4');
    } catch (err) {
        logConsole('[FAILED] Terjadi kesalahan: ' + err.message);
    }
});
</script>
</body>
</html>
