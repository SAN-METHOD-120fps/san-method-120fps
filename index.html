<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAN METHOD 120FPS</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
min-height:100%;
background:#000;
font-family:Arial,sans-serif;
overflow-x:hidden;
}

body{
display:flex;
justify-content:center;
padding:18px 10px;
}

.box{
width:100%;
max-width:430px;
background:#050505;
border:2px solid cyan;
border-radius:18px;
padding:26px 16px;
text-align:center;
box-shadow:0 0 30px rgba(0,255,255,.25);
}

.pp{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:4px solid cyan;
margin:auto;
display:block;
margin-bottom:22px;
background:#111;
}

h1{
font-family:'Roboto',sans-serif;
font-size:42px;
line-height:45px;
font-weight:900;
color:cyan;
text-shadow:0 0 18px rgba(0,255,255,.8);
margin-bottom:14px;
}

.sub{
font-size:14px;
letter-spacing:2px;
color:#fff;
margin-bottom:20px;
}

.follow-btn,
.upload-btn{
width:100%;
height:58px;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
font-family:'Roboto',sans-serif;
font-size:20px;
font-weight:900;
border-radius:14px;
margin-bottom:16px;
position:relative;
overflow:hidden;
color:#fff;
background:#000;
}

.follow-btn::before{
content:"";
position:absolute;
inset:0;
padding:2px;
border-radius:14px;
background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet,red);
background-size:300% 300%;
animation:rgb 4s linear infinite;
-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
-webkit-mask-composite:xor;
mask-composite:exclude;
}

.follow-btn::after{
content:"";
position:absolute;
inset:3px;
background:#000;
border-radius:12px;
z-index:1;
}

.follow-btn span,
.upload-btn span{
position:relative;
z-index:2;
}

.upload-btn{
border:2px solid red;
}

@keyframes rgb{
0%{background-position:0% 50%;}
100%{background-position:300% 50%;}
}

.tutorial{
margin-top:8px;
border:2px solid orange;
border-radius:14px;
padding:16px;
margin-bottom:22px;
background:#000;
text-align:left;
color:#fff;
line-height:28px;
font-size:15px;
}

.injectwrap{
width:100%;
border:2px solid cyan;
border-radius:18px;
padding:14px;
background:#000;
box-shadow:0 0 20px rgba(0,255,255,.25);
}

.file-box{
border:1px solid rgba(0,255,255,.7);
border-radius:14px;
padding:16px;
margin-bottom:24px;
text-align:left;
background:#020707;
}

.file-label{
font-size:14px;
color:#9fffff;
margin-bottom:10px;
display:block;
}

input[type=file]{
width:100%;
background:#000;
border:1px solid rgba(0,255,255,.4);
border-radius:10px;
padding:12px;
font-size:15px;
color:cyan;
}

.file-name{
margin-top:12px;
font-size:14px;
line-height:1.5;
color:#19fff4;
word-break:break-all;
}

.inject-btn{
width:100%;
border:none;
border-radius:14px;
padding:24px 10px;
margin-bottom:28px;
background:#23d3d3;
font-size:22px;
font-weight:900;
letter-spacing:8px;
color:#000;
box-shadow:0 0 42px rgba(18,217,213,.9);
cursor:pointer;
}

.inject-btn:disabled{
opacity:.45;
cursor:not-allowed;
box-shadow:none;
}

.terminal{
border-radius:16px;
overflow:hidden;
background:#000;
border:1px solid rgba(255,255,255,.12);
}

.terminal-header{
height:52px;
background:#1d1d1d;
display:flex;
align-items:center;
gap:10px;
padding:0 18px;
font-size:14px;
letter-spacing:4px;
color:#777;
}

.dot{
width:17px;
height:17px;
border-radius:50%;
}

.red{background:#ff5f56;}
.yellow{background:#ffbd2e;}
.green{background:#27c93f;}

.terminal-body{
min-height:320px;
max-height:420px;
overflow-y:auto;
padding:20px;
font-size:14px;
line-height:1.8;
font-family:"Courier New",monospace;
color:#27ff4a;
text-shadow:0 0 8px rgba(39,255,74,.7);
white-space:pre-wrap;
text-align:left;
}

.download-btn{
display:none;
margin-top:18px;
padding:16px;
border:2px solid cyan;
border-radius:14px;
text-decoration:none;
color:cyan;
font-weight:bold;
font-size:16px;
box-shadow:0 0 20px rgba(0,255,255,.3);
}
</style>
</head>
<body>

<div class="box">

<img src="icon.png" class="pp" onerror="this.style.display='none'">

<h1>SAN METHOD<br>120FPS</h1>

<div class="sub">REAL FAST REMUX METHOD</div>

<a href="https://www.tiktok.com/@sann_cuyyy2?_r=1&_t=ZS-96UwUP65KD3" target="_blank" class="follow-btn">
<span>Follow TikTok</span>
</a>

<a href="https://www.tiktok.com/upload" target="_blank" class="upload-btn">
<span>Upload TikTok here</span>
</a>

<div class="tutorial">
<b>Tutorial :</b><br><br>
1. Pilih video MP4<br>
2. Tekan INJECT VIDEO<br>
3. Tunggu proses selesai<br>
4. File otomatis download<br>
5. Upload hasil ke TikTok
</div>

<div class="injectwrap">

<div class="file-box">
<label class="file-label">Pilih video MP4:</label>
<input id="videoInput" type="file" accept="video/mp4,.mp4">
<div id="fileName" class="file-name">Belum ada file dipilih.</div>
</div>

<button id="injectBtn" class="inject-btn" disabled>
INJECT VIDEO
</button>

<div class="terminal">
<div class="terminal-header">
<span class="dot red"></span>
<span class="dot yellow"></span>
<span class="dot green"></span>
<span>bash - core_process</span>
</div>

<div id="terminalBody" class="terminal-body">
> Pilih video MP4 terlebih dahulu.
</div>
</div>

<a id="downloadBtn" class="download-btn">
DOWNLOAD MANUAL
</a>

</div>
</div>

<script type="module">
import { FFmpeg } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/+esm';
import { fetchFile,toBlobURL } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/+esm';

const videoInput=document.getElementById('videoInput');
const fileName=document.getElementById('fileName');
const injectBtn=document.getElementById('injectBtn');
const terminal=document.getElementById('terminalBody');
const downloadBtn=document.getElementById('downloadBtn');

let selectedFile=null;
let ffmpegLoaded=false;

const ffmpeg=new FFmpeg();

function log(text){
terminal.textContent+=text+'\n';
terminal.scrollTop=terminal.scrollHeight;
}

function clearTerminal(){
terminal.textContent='';
}

function sleep(ms){
return new Promise(resolve=>setTimeout(resolve,ms));
}

videoInput.addEventListener('change',()=>{
selectedFile=videoInput.files[0];

if(!selectedFile){
injectBtn.disabled=true;
return;
}

fileName.innerHTML='File: '+selectedFile.name;
injectBtn.disabled=false;

clearTerminal();

log('> [SYSTEM] Target detected');
log('> [SYSTEM] MP4 stream confirmed');
log('> [READY] Press INJECT VIDEO');
});

async function loadFFmpeg(){

if(ffmpegLoaded)return;

log('> [SYSTEM] Loading core module...');

const base='https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.10/dist/esm';

await ffmpeg.load({
coreURL:await toBlobURL(`${base}/ffmpeg-core.js`,'text/javascript'),
wasmURL:await toBlobURL(`${base}/ffmpeg-core.wasm`,'application/wasm')
});

ffmpegLoaded=true;

log('> [SYSTEM] Core module loaded');
}

injectBtn.addEventListener('click',async()=>{

if(!selectedFile)return;

injectBtn.disabled=true;
clearTerminal();

try{

log('> [SYSTEM] Target: '+selectedFile.name);
await sleep(300);

log('> [SYSTEM] Verifying internal structure...');
await sleep(400);

log('> [SYSTEM] Track signature confirmed');
await sleep(350);

await loadFFmpeg();

const inputName='input.mp4';
const outputName=selectedFile.name.replace('.mp4','')+'_SAN_METHOD.mp4';

log('> [SYSTEM] Writing stream buffer...');

await ffmpeg.writeFile(
inputName,
await fetchFile(selectedFile)
);

log('> [SYSTEM] Fast remux mode enabled');
await sleep(300);

log('> [SYSTEM] Metadata injection active');
await sleep(300);

log('> [SYSTEM] Finalizing MP4 container...');

await ffmpeg.exec([
'-i',inputName,
'-map','0',
'-c','copy',
'-movflags','+faststart',
'-metadata','encoder=Lavf61.7.100',
'-metadata','major_brand=mp42',
'-metadata','compatible_brands=mp42isomavc1',
'-metadata','minor_version=0',
'-metadata','SAN_METHOD=ACTIVE',
outputName
]);

const data=await ffmpeg.readFile(outputName);

const blob=new Blob([
data.buffer
],{
type:'video/mp4'
});

const url=URL.createObjectURL(blob);

log('> [SUCCESS] Injection completed');
log('> [OUTPUT] '+outputName);
log('> [SYSTEM] Auto downloading...');

const a=document.createElement('a');
a.href=url;
a.download=outputName;
document.body.appendChild(a);
a.click();
document.body.removeChild(a);

downloadBtn.href=url;
downloadBtn.download=outputName;
downloadBtn.style.display='block';

}catch(err){

log('> [FAILED] '+err.message);

}

injectBtn.disabled=false;

});
</script>

</body>
</html>
